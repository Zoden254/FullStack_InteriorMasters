{% extends "master.html" %}

{% block title %}Profile{% endblock title %}

{% block content %}

{% include "back_home.html" %}

<a href="{% url "e_com:logout" %}" class="float-end text-sm mr-5 bg-red-400 p-2 rounded font-light text-white mt-10 border hover:bg-white hover:text-yellow-400">Logout</a>

<div class="text-center">
    <!--Profile pic-->
    <div class="mt-20 w-full flex justify-center">
        <a href="/image/{{ user.profile_pic }}"><img src="{{user.profile_pic.url}}" class="size-60 rounded-full shadow-md border-4 border-gray-200"></a><br>
    </div>
    <!--Name and Bio-->
    <div class="mt-4">
        <p class="font-bold text-2xl">{{ user.username }}</p>
        
        <p class="opacity-65 p-10 border border-gray-400 mx-5 mt-3 md:mx-20 rounded-2xl">
            {% if user.bio %}
            <span>{{ user.bio }}</span>
            {% else %}
            <span class="text-3xl font-extrabold opacity-20">No Bio</p>
            {% endif %}
            </p>
       
    </div>
    <div class="flex justify-center items-center m-2">
        <a href="{% url "e_com:cart_view" %}" class="bg-green-500 border text-white w-fit flex p-2 rounded hover:text-green-500 hover:bg-white">My Cart
            <span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path d="M2.25 2.25a.75.75 0 0 0 0 1.5h1.386c.17 0 .318.114.362.278l2.558 9.592a3.752 3.752 0 0 0-2.806 3.63c0 .414.336.75.75.75h15.75a.75.75 0 0 0 0-1.5H5.378A2.25 2.25 0 0 1 7.5 15h11.218a.75.75 0 0 0 .674-.421 60.358 60.358 0 0 0 2.96-7.228.75.75 0 0 0-.525-.965A60.864 60.864 0 0 0 5.68 4.509l-.232-.867A1.875 1.875 0 0 0 3.636 2.25H2.25ZM3.75 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0ZM16.5 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" />
                    </svg>
            </span>
        </a>
    </div>
</div>
{% include "footer.html" %}
{% endblock content %}
