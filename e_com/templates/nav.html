{% extends "elements.html" %}

{% block nav %}

    <nav class="z-1 nav-bar fixed top-0 bg-indigo-600 w-full shadow-2xl pt-2">
        <p class="text-center text-2xl sm:text-4xl font-bold text-white "><span class="float-left m-2 md:text-4xl">Interior Masters</span>
            {% if not user.is_authenticated %}
            <div class="float-end text-sm mr-3">
                <a href="/signup/" class="float-left hover:text-blue-500 flex text-nowrap hover:bg-white order  text-sm md:text-lg mr-3 p-1 rounded border border-white font-light text-white">Sign Up
                    <span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                        </svg>
                    </span>
                </a>
                <a href="{% url "e_com:login" %}" class="float-end hover:text-green-500 hover:bg-transparent border border-green-500 text-sm md:text-lg mr-3 bg-green-600 p-1 rounded font-light text-white">Login</a>
                
            </div>
            {% else %}
            <div class="flex float-right mr-15 w-fit gap-3 md:mr-20">
                <a href="{% url "message_app:messages" %}" class="text-white" title="inbox">
                    
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-10">
                    <path d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                    <path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
                    </svg>

                </a>
                
                <a href="{% url "e_com:cart_view" %}" class="text-2xl hover:bg-transparent text-white hover:text-black border-2 p-1 rounded-full" title="My Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                </a>
                <a href="{% url "e_com:profile" %}" title="View Profile"><img src="{{ user.profile_pic.url }}" alt="profile.pic" class="size-10 rounded-full hover:opacity-70 md:size-11 absolute"></a>
            </div>
            {% endif %}
        </p><br>
        <ul class="flex ml-3 lg:gap-40 p-3 font-medium text-white float-left">
            
            <a href="{% url "e_com:home" %}" class="hover:bg-white hover:text-indigo-600 rounded-2xl transition-colors px-3"><li>Home</li></a>
            <a href="{% url "e_com:samples" %}" class="rounded-2xl  px-3 hover:bg-white hover:text-indigo-600 transition-colors"><li>Samples</li></a>
            <a href="{% url "e_com:services" %}" class="rounded-2xl  px-3 hover:bg-white hover:text-indigo-600 transition-colors"><li>Services</li></a>
            <a href="{% url "e_com:engage" %}" class="rounded-2xl  px-3 hover:bg-white hover:text-indigo-600 transition-colors"><li>Engage</li></a>
            
        </ul>

        
    </nav>

{% endblock nav %}
